name: Test Automation

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    - cron: "0 1 * * *"   # nightly at 01:00 UTC

env:
  IMAGE_TAG: ${{ github.sha }}
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/test-automation

jobs:

  # ── Build and push the image (shared across all test jobs) ──────────────
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx (layer cache)
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          # Cache Maven dep layer across builds — the biggest time saver
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ── Smoke — every PR ────────────────────────────────────────────────────
  smoke:
    needs: build-image
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke suite
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          APP_URL:   ${{ secrets.QA_APP_URL }}
          API_URL:   ${{ secrets.QA_API_URL }}
          DB_URL:    ${{ secrets.QA_DB_URL }}
          DB_USER:   ${{ secrets.QA_DB_USER }}
          DB_PASS:   ${{ secrets.QA_DB_PASS }}
        run: docker compose run --rm smoke

      - name: Upload smoke artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results-${{ github.run_id }}
          path: |
            workspace/reports/
            workspace/screenshots/
            workspace/logs/
          retention-days: 7

  # ── Regression — merge to main, three parallel shards ───────────────────
  regression:
    needs: build-image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - name: Run regression shard ${{ matrix.shard }}
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          APP_URL:   ${{ secrets.QA_APP_URL }}
          API_URL:   ${{ secrets.QA_API_URL }}
          DB_URL:    ${{ secrets.QA_DB_URL }}
          DB_USER:   ${{ secrets.QA_DB_USER }}
          DB_PASS:   ${{ secrets.QA_DB_PASS }}
        run: docker compose run --rm regression-shard-${{ matrix.shard }}

      - name: Upload shard ${{ matrix.shard }} artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-shard-${{ matrix.shard }}-${{ github.run_id }}
          path: workspace/
          retention-days: 14

  # ── Nightly — scheduled full suite ──────────────────────────────────────
  nightly:
    needs: build-image
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Run nightly suite
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          APP_URL:   ${{ secrets.QA_APP_URL }}
          API_URL:   ${{ secrets.QA_API_URL }}
          DB_URL:    ${{ secrets.QA_DB_URL }}
          DB_USER:   ${{ secrets.QA_DB_USER }}
          DB_PASS:   ${{ secrets.QA_DB_PASS }}
        run: docker compose run --rm nightly

      - name: Upload nightly artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ github.run_id }}
          path: workspace/
          retention-days: 30
