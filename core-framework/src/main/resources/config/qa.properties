# QA Environment Configuration

# Browser Configuration
browser=chromium
headless=false

# API Configuration
api.base.url=https://api-qa.example.com

# Database Configuration - Oracle
db.type=oracle
db.url=jdbc:oracle:thin:@qa-db-server:1521:qadb
db.username=qa_user
db.password=${DB_PASSWORD}

# Secondary Database - MS SQL (if needed)
db.secondary.type=mssql
db.secondary.url=jdbc:sqlserver://qa-mssql-server:1433;databaseName=qadb
db.secondary.username=qa_user
db.secondary.password=${DB_SECONDARY_PASSWORD}

# Kafka Configuration
kafka.bootstrap.servers=qa-kafka-broker-1:9092,qa-kafka-broker-2:9092
kafka.group.id=test-automation-qa
kafka.auto.offset.reset=earliest

# JMS / ActiveMQ Configuration
jms.provider=activemq
jms.destination.type=queue
jms.broker.url=tcp://qa-activemq-server:61616
jms.username=qa_user
jms.password=${JMS_PASSWORD}

# Example named IBM MQ client (use MessagingManager.jms("mq"))
jms.mq.provider=ibm_mq
jms.mq.destination.type=queue
jms.mq.mq.host=qa-ibmmq-server
jms.mq.mq.port=1414
jms.mq.mq.queue.manager=QMGR_QA
jms.mq.mq.channel=QA.SVRCONN
jms.mq.username=qa_mq_user
jms.mq.password=${JMS_MQ_PASSWORD}
