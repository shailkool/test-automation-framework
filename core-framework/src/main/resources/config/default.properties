# Default Configuration Properties

# Browser Configuration
browser=chromium
headless=false
timeout=30000
test.timeout.ms=60000

# Reporting
report.screenshots.on.failure=true
report.screenshots.on.pass=false
report.extent.dir=target/extent-reports/
report.metrics.dir=target/metrics/

# Playwright Video Recording
playwright.video.enabled=true
playwright.video.dir=target/videos/

# API Configuration
api.base.url=https://api.example.com
api.timeout=30000

# Database Configuration
db.type=oracle
db.url=jdbc:oracle:thin:@localhost:1521:xe
db.username=testuser
db.password=${DB_PASSWORD}

# HikariCP pool configuration
db.pool.maximumPoolSize=10
db.pool.minimumIdle=2
db.pool.connectionTimeout=10000
db.pool.idleTimeout=600000
db.pool.maxLifetime=1800000

# Reporting
report.screenshots.on.failure=true
report.screenshots.on.pass=false

# Logging
log.level=INFO

# Kafka Configuration
kafka.bootstrap.servers=localhost:9092
kafka.group.id=test-automation-group
kafka.client.id=test-automation-client
kafka.auto.offset.reset=earliest
kafka.poll.timeout.ms=5000
kafka.key.serializer=org.apache.kafka.common.serialization.StringSerializer
kafka.value.serializer=org.apache.kafka.common.serialization.StringSerializer
kafka.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
kafka.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

# JMS / MQ Configuration
# provider: activemq | ibm_mq | custom
jms.provider=activemq
jms.destination.type=queue
jms.broker.url=tcp://localhost:61616
jms.receive.timeout.ms=5000

# IBM MQ specifics (used when jms.provider=ibm_mq)
#jms.mq.host=localhost
#jms.mq.port=1414
#jms.mq.queue.manager=QM1
#jms.mq.channel=SYSTEM.DEF.SVRCONN
#jms.mq.transport.type=CLIENT
